# ── Oni · Hyprland ────────────────────────────────────────────
# Rig: 9800X3D · RX 9070 XT · 3× GO27Q24G (WOLED)

# ── Monitors (verify names with `hyprctl monitors`) ──────────
monitor = DP-1, 2560x1440@240, 0x0,    1   # left
monitor = DP-2, 2560x1440@240, 2560x0, 1   # center
monitor = DP-3, 2560x1440@240, 5120x0, 1   # right

# ── Workspace → monitor pinning ───────────────────────────────
# center: 1-3 (game/work rotation) · left: 4-5 · right: 6-7
workspace = 1, monitor:DP-2, default:true
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-1, default:true
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-3, default:true
workspace = 7, monitor:DP-3

# ── Autostart ─────────────────────────────────────────────────
exec-once = waybar
exec-once = mako
exec-once = awww-daemon
exec-once = ~/.local/bin/oni-wallpaper
exec-once = eww daemon && eww open oni-widgets
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular   # clipboard survives closing the source app
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Env ───────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1
env = HYPRSHOT_DIR,$HOME/Pictures/screenshots

# ── Oni palette ───────────────────────────────────────────────
# $accent / $accentdim come from the wallpaper (matugen) — see oni-wallpick
source = ~/.cache/oni/colors-hyprland.conf
$ice = rgb(9db8c4)
$oni = rgb(e5484d)

# ── Look ──────────────────────────────────────────────────────
general {
    gaps_in = 8
    gaps_out = 14
    border_size = 2
    col.active_border   = $accent
    col.inactive_border = rgba(1b2624ff)
    layout = dwindle
}

decoration {
    rounding = 9
    blur {
        enabled = true
        size = 6
        passes = 2
    }
    shadow {
        enabled = true
        range = 18
        color = rgba(5fe0c022)
    }
}

# ── Animations ────────────────────────────────────────────────
animations {
    enabled = true
    bezier = oniSnap, 0.2, 1.2, 0.4, 1.0
    bezier = oniEase, 0.2, 0.8, 0.3, 1.0
    animation = windows,     1, 3, oniSnap, popin 96%
    animation = windowsOut,  1, 3, oniEase, popin 96%
    animation = fade,        1, 3, oniEase
    animation = workspaces,  1, 3, oniSnap, slidefade 12%
    animation = specialWorkspace, 1, 3, oniSnap, slidefadevert 8%
    animation = border,      1, 4, oniEase
}

dwindle {
    preserve_split = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

misc {
    disable_hyprland_logo = true
    background_color = 0x000000
}

# ══ Binds ═════════════════════════════════════════════════════
$mod = SUPER

# ── Apps (your muscle-memory row) ─────────────────────────────
bind = $mod, T, exec, kitty                                        # Terminal
bind = $mod, E, exec, nautilus                                     # Explorer
bind = $mod, B, exec, firefox                                      # Browser
bind = $mod, M, exec, firefox --new-window https://mail.proton.me  # Mail  (→ firefoxpwa later)
bind = $mod, A, exec, firefox --new-window https://claude.ai       # AI    (→ firefoxpwa later)
bind = $mod, S, exec, steam                                        # Steam
bind = $mod, D, exec, discord                                      # Discord
bind = $mod, Y, exec, youtube-music                                # YT Music (AUR: youtube-music-bin)
bind = $mod, RETURN, exec, kitty                                   # habit fallback

# ── Scratchpads (overlay anything, incl. fullscreen games) ────
bind = $mod, grave, exec, pgrep -f kitty-drop >/dev/null && hyprctl dispatch togglespecialworkspace term || kitty --class kitty-drop
bind = $mod, X,     togglespecialworkspace, files   # quick explorer over game
bind = $mod, W, exec, eww open --toggle oni-widgets   # show/hide desktop widgets
bind = $mod SHIFT, W, exec, oni-wallpick               # wallpaper picker → restyle accent
bind = $mod, K, exec, kitty --class kitty-keys -e oni-keys

# ── System ────────────────────────────────────────────────────
bind = $mod, SPACE, exec, wofi --show drun --style ~/.cache/oni/wofi.css
bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, V, togglefloating
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy   # clipboard history
bind = $mod SHIFT, C, exec, hyprpicker -a                                        # color picker → clipboard
# ── Screenshots (hyprshot: saves to $HYPRSHOT_DIR AND copies to clipboard) ──
bind = , PRINT, exec, hyprshot -m region                    # select region
bind = SHIFT, PRINT, exec, hyprshot -m output -m active     # current monitor
bind = $mod, PRINT, exec, hyprshot -m window                # click a window
bind = $mod SHIFT, S, exec, hyprshot -m region --clipboard-only   # region → clipboard only (Windows muscle memory)
bind = $mod, G, exec, hyprctl keyword animations:enabled "$(hyprctl -j getoption animations:enabled | grep -q 'true' && echo 0 || echo 1)"  # game mode: animations off
bind = $mod, L, exec, hyprlock

# ── Workspaces 1-7 ────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7

# ── Focus / move / monitors ───────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod CTRL, left,  focusmonitor, l
bind = $mod CTRL, right, focusmonitor, r
bind = $mod CTRL SHIFT, left,  movewindow, mon:l
bind = $mod CTRL SHIFT, right, movewindow, mon:r
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Media keys ────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# ── Window rules ──────────────────────────────────────────────
windowrule = match:class ^(discord|vesktop)$, workspace 4
windowrule = match:title ^(.*Proton Mail.*)$, workspace 5
windowrule = match:class ^(YouTube Music|com.github.th_ch.youtube_music)$, workspace 6
windowrule = match:title ^(.*Claude.*)$, workspace 7
windowrule = match:class ^(steam)$, workspace 2

# Scratchpad: Nautilus
windowrule = match:class ^(org.gnome.Nautilus)$, workspace special:files, float on, size 1200 700, center on

# Scratchpad: dropdown terminal
windowrule = match:class ^(kitty-drop)$, workspace special:term, float on, size 1400 500, move 580 40

# Scratchpad: keybind cheatsheet
windowrule = match:class ^(kitty-keys)$, float on, size 560 900, center on

# Behavior
windowrule = match:class ^(kitty)$, opacity 0.97 0.94
windowrule = match:class ^(steam_app_.*)$, immediate on

# Oni · hypridle — OLED protection ladder
general {
    lock_cmd = pidof hyprlock || hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
}

# 120 s: dim WOLEDs via DDC (needs `ddcutil`, i2c-dev group, see README)
listener {
    timeout = 120
    on-timeout = ddcutil setvcp 10 15 --display 1; ddcutil setvcp 10 15 --display 2; ddcutil setvcp 10 15 --display 3
    on-resume  = ddcutil setvcp 10 80 --display 1; ddcutil setvcp 10 80 --display 2; ddcutil setvcp 10 80 --display 3
}

# 10 min: lock
listener {
    timeout = 600
    on-timeout = pidof hyprlock || hyprlock
}

# 15 min: panels fully off (the real OLED saver)
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
